<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Βγάλε και εσύ το δικό σου δίπλωμα!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --academic-blue: #002147;
            --academic-gold: #c5a059;
            --bg-paper: #f4f1ea;
            --text-main: #333333;
            --border-color: #d1c7b7;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 33, 71, 0.1);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* Επίσημη Κεφαλίδα */
        .header {
            background-color: var(--academic-blue);
            color: var(--academic-gold);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--academic-gold);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 12px;
            margin-top: 15px;
            color: #e0d5c1;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .form-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 20px;
            color: var(--academic-blue);
        }

        input {
            padding: 14px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            border: 1px solid var(--border-color);
            background-color: #faf9f6;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--academic-blue);
            box-shadow: 0 0 0 3px rgba(0, 33, 71, 0.1);
        }

        button, .download-btn {
            padding: 16px;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
        }

        button {
            background-color: var(--academic-blue);
            color: var(--academic-gold);
            margin-top: 15px;
        }

        button:hover {
            background-color: #001530;
            color: #ffffff;
        }

        .download-btn {
            display: none;
            background-color: transparent;
            color: var(--academic-blue);
            border: 2px solid var(--academic-blue);
            margin-top: 10px;
        }

        .download-btn:hover {
            background-color: var(--academic-blue);
            color: var(--academic-gold);
        }

        canvas {
            max-width: 100%;
            border: 1px solid var(--border-color);
            margin-top: 20px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .disclaimer {
            font-size: 11px;
            color: #a0a0a0;
            text-align: center;
            padding: 0 30px 10px 30px;
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            padding-bottom: 20px;
            font-size: 12px;
            color: #a0a0a0;
        }

        .footer a {
            color: var(--academic-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Βγάλε και εσύ το δικό σου δίπλωμα!</h1>
            <div class="subtitle">Αυτοματοποιημενο Συστημα Απονομης</div>
        </div>
        
        <div class="form-content">
            <div class="input-group">
                <label for="nameInput">Πλήρες Ονοματεπώνυμο</label>
                <input type="text" id="nameInput" placeholder="Εισάγετε το όνομά σας">
            </div>
            
            <div class="input-group">
                <label for="degreeInput">Ακαδημαϊκός Τίτλος</label>
                <input type="text" id="degreeInput" placeholder="Εισάγετε τον τίτλο σπουδών">
            </div>
            
            <button onclick="generateDiploma()">Εκδοση Διπλωματος</button>
            
            <canvas id="diplomaCanvas"></canvas>
            <a id="downloadBtn" class="download-btn" download="official_diploma.jpg">Ληψη Εγγραφου</a>
        </div>
        
        <div class="disclaimer">
            *το διπλωμα αυτο δεν εξασφαλιζει εργασια σε δημοσιο φορεα, θα πρεπει να απευθυνθειτε σε αρμοδιους κουμπαρους ή/και φίλους φίλων σε ηδη υπαρχουσα θέση
        </div>

        <div class="footer">
            made by <a href="https://www.instagram.com/urso_albo/" target="_blank" rel="noopener noreferrer">urso_albo</a>
        </div>
    </div>

    <script>
        document.fonts.ready.then(function() {
            console.log('Fonts loaded.');
        });

        function generateDiploma() {
            const nameText = document.getElementById('nameInput').value;
            const degreeText = document.getElementById('degreeInput').value;
            
            const canvas = document.getElementById('diplomaCanvas');
            const ctx = canvas.getContext('2d');
            const downloadBtn = document.getElementById('downloadBtn');
            
            const img = new Image();
            img.src = 'template.jpg'; 
            
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                
                ctx.drawImage(img, 0, 0);
                
                const fontSize = canvas.height * 0.04; 
                ctx.font = `italic 600 ${fontSize}px "Cormorant Garamond", serif`;
                ctx.textAlign = 'center';
                ctx.fillStyle = '#333333'; 

                const centerX = canvas.width / 2;
                const nameY = canvas.height * 0.385;   
                const degreeY = canvas.height * 0.525; 
                
                ctx.fillText(nameText, centerX, nameY);
                ctx.fillText(degreeText, centerX, degreeY);
                
                canvas.style.display = 'block';
                downloadBtn.style.display = 'block';
                
                try {
                    downloadBtn.href = canvas.toDataURL('image/jpeg', 0.9);
                } catch (e) {
                    console.error("CORS Error: Λειτουργία σε τοπικό αρχείο.", e);
                    downloadBtn.onclick = (event) => {
                        event.preventDefault();
                        alert("Η λήψη μπλοκαρίστηκε από τον browser (τοπικό αρχείο). Ανεβάστε το στο GitHub Pages.");
                    };
                }
            };

            img.onerror = () => {
                alert("Σφάλμα συστήματος: Αδυναμία φόρτωσης του template.jpg.");
            };
        }
    </script>
</body>
</html>
